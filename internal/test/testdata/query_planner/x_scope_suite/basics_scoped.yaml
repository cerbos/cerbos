# yaml-language-server: $schema=../../.jsonschema/CrossScopeQueryPlannerTestSuite.schema.json
---
description: Basics tests with a scope, should fall through to the parent policy 
principal:
    id: user123
    policyVersion: default
    roles:
        - USER
    attr:
      userQid: z0
tests:
    - action: writeX
      resource:
        kind: x
        scopes:
          - acme.hr
        policyVersion: default
      want:
        kind: KIND_CONDITIONAL
        condition: &hr
          expression:
            operator: and
            operands:
              - expression:
                  operator: eq
                  operands:
                    - variable: request.resource.scope
                    - value: acme.hr
              - expression:
                  operator: eq
                  operands:
                    - value: z0
                    - variable: request.resource.id
    - action: writeX
      resource:
        kind: x
        scopes:
          - acme.it
        policyVersion: default
      want:
        kind: KIND_CONDITIONAL
        condition: &it
          expression:
            operator: and
            operands:
              - expression:
                  operator: eq
                  operands:
                    - variable: request.resource.scope
                    - value: acme.it
              - expression:
                  operator: eq
                  operands:
                    - variable: request.resource.attr.status
                    - value: "PENDING_STATUS"
    - action: writeX
      resource:
        kind: x
        scopes:
          - acme.it
          - acme.hr
        policyVersion: default
      want:
        kind: KIND_CONDITIONAL
        condition:
          expression:
            operator: or
            operands:
              - <<: *it
              - <<: *hr
