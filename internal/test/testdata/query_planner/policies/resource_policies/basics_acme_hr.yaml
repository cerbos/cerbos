# yaml-language-server: $schema=../../../../../../schema/jsonschema/cerbos/policy/v1/Policy.schema.json
---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  version: default
  resource: x
  scope: acme.hr
  rules:
    - actions:
        - update_profile
      effect: EFFECT_ALLOW
      roles:
        - USER
    - actions:
        - writeX
      effect: EFFECT_ALLOW
      roles:
        - USER
      condition:
        match:
          expr: |-
            P.attr.userQid == R.id
