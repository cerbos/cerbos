# yaml-language-server: $schema=../../../../../schema/jsonschema/cerbos/policy/v1/Policy.schema.json
---
apiVersion: api.cerbos.dev/v1
rolePolicy:
  role: acme_london_employee
  scope: acme.hr.uk.london
  parentRoles:
    - "employee"
  rules:
    - resource: "*"
      name: city_check
      allowActions: ["create"]
      condition:
        match:
          expr: P.attr.city == "london"
      output:
        when:
          ruleActivated: |-
            "%s_in_london".format([request.principal.id])
          conditionNotMet: |-
            "%s_not_in_london".format([request.principal.id])

    - resource: "leave_request"
      name: anonymise_rule
      allowActions: ["anonymise"]
      output:
        when:
          ruleActivated: |-
            "anonymise_allowed:%s".format([request.principal.id])
