name: "antora-docs"
description: "Build the docs using Antora"
runs:
  using: "docker"
  image: "docker://docker.io/antora/antora:3.1.14"
  args:
    - "sh"
    - "-c"
    - "yarn global add @cerbos/antora-llm-generator @antora/collector-extension && antora --stacktrace --clean docs/antora-playbook.yml"
