---
name: Test Lambda Function Publishing
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Test version (e.g., v1.0.0-test)"
        required: false
        default: "v0.0.0-test"
        type: string
      arch:
        description: "Architecture to test"
        required: false
        default: "arm64"
        type: choice
        options:
          - arm64
          - amd64

jobs:
  buildBinaries:
    name: Release Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Go and restore cached dependencies
        uses: ./.github/actions/setup-go
        with:
          cross_compiling: true

      - name: Install tools
        uses: cerbos/actions/install-tools@d5b49896c2cc22445a5167142912282a987ff9ae # main
        with:
          tools: |-
            goreleaser
            syft

      - name: GoReleaser
        run: goreleaser build --config=.goreleaser.yml --snapshot --id cerbos-aws-lambda-ext --id cerbos-aws-lambda-func --clean
        env:
          TELEMETRY_WRITE_KEY: ${{ secrets.TELEMETRY_WRITE_KEY }}
          TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts
          path: dist/

  testPublishLambdaFunction:
    name: Test Publish AWS Lambda Function to SAR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: buildBinaries
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-2
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifacts
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          use-installer: true

      - name: Install just
        uses: cerbos/actions/install-tools@d5b49896c2cc22445a5167142912282a987ff9ae # main
        with:
          tools: just

      - name: Test Lambda function publishing
        run: |
          export AWS_REGION="${VARS_AWS_REGION}"
          just -f deploy/awslambda/function/.justfile publish-to-sar "${GITHUB_EVENT_INPUTS_VERSION}" "${{ secrets.AWS_SAR_PUBLISHING_BUCKET }}" "${GITHUB_EVENT_INPUTS_ARCH}"
        env:
          VARS_AWS_REGION: ${{ vars.AWS_REGION }}
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
          GITHUB_EVENT_INPUTS_ARCH: ${{ github.event.inputs.arch }}

      - name: Test Lambda extension publishing
        run: |
          export AWS_REGION="${VARS_AWS_REGION}"
          just -f deploy/awslambda/extension/.justfile publish-to-sar "${GITHUB_EVENT_INPUTS_VERSION}" "${{ secrets.AWS_SAR_PUBLISHING_BUCKET }}" "${GITHUB_EVENT_INPUTS_ARCH}"
        env:
          VARS_AWS_REGION: ${{ vars.AWS_REGION }}
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
          GITHUB_EVENT_INPUTS_ARCH: ${{ github.event.inputs.arch }}
