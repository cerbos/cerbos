---
name: Test Lambda Function Publishing
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Test version (e.g., v1.0.0-test)"
        required: false
        default: "v0.0.0-test"
        type: string
      arch:
        description: "Architecture to test"
        required: false
        default: "arm64"
        type: choice
        options:
          - arm64
          - amd64

jobs:
  buildBinaries:
    name: Release Binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      - name: Install Go and restore cached dependencies
        uses: ./.github/actions/setup-go
        with:
          cross_compiling: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: build --config=.goreleaser.yml --snapshot --id cerbos-aws-lambda-ext --id cerbos-aws-lambda-func --clean
        env:
          TELEMETRY_WRITE_KEY: ${{ secrets.TELEMETRY_WRITE_KEY }}
          TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}

      - name: Upload artifacts as goreleaser build does not upload them
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts
          path: dist/

  testPublishLambdaFunction:
    name: Test Publish AWS Lambda Function to SAR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: buildBinaries
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-2
    steps:
      - uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        with:
          config: ${{ vars.PERMISSIONS_CONFIG }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: artifacts
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@d78e1a4a9656d3b223e59b80676a797f20093133 # v2
        with:
          use-installer: true

      - name: Install just
        uses: ./.github/actions/setup-just

      - name: Test Lambda function publishing
        run: |
          export AWS_REGION="${VARS_AWS_REGION}"
          just -f deploy/awslambda/function/.justfile publish-to-sar "${GITHUB_EVENT_INPUTS_VERSION}" "${{ secrets.AWS_SAR_PUBLISHING_BUCKET }}" "${GITHUB_EVENT_INPUTS_ARCH}"
        env:
          VARS_AWS_REGION: ${{ vars.AWS_REGION }}
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
          GITHUB_EVENT_INPUTS_ARCH: ${{ github.event.inputs.arch }}

      - name: Test Lambda extension publishing
        run: |
          export AWS_REGION="${VARS_AWS_REGION}"
          just -f deploy/awslambda/extension/.justfile publish-to-sar "${GITHUB_EVENT_INPUTS_VERSION}" "${{ secrets.AWS_SAR_PUBLISHING_BUCKET }}" "${GITHUB_EVENT_INPUTS_ARCH}"
        env:
          VARS_AWS_REGION: ${{ vars.AWS_REGION }}
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
          GITHUB_EVENT_INPUTS_ARCH: ${{ github.event.inputs.arch }}
